# Contract: Release Workflow (release.yml)
#
# This is the contract definition for the release workflow.
# The actual workflow file will be at .github/workflows/release.yml
#
# Trigger: Push tag matching v*.*.*
# Steps: checkout → setup JDK 21 → import GPG → set version from tag →
#        build + sign + deploy → bump to next SNAPSHOT → push to main
# Secrets: GPG_PRIVATE_KEY, GPG_PASSPHRASE, CENTRAL_USERNAME, CENTRAL_PASSWORD, RELEASE_TOKEN

name: Release

on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD

      - name: Import GPG key
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import

      - name: Set release version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Build, sign, and deploy
        run: mvn -B -P release deploy
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

      - name: Bump to next SNAPSHOT
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT_VERSION="$major.$minor.$((patch+1))-SNAPSHOT"
          mvn -B versions:set -DnewVersion="$NEXT_VERSION" -DgenerateBackupPoms=false
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to $NEXT_VERSION [skip ci]"
          git push origin HEAD:main
